name: Deploy to Netlify

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify deploy
        run: curl -X POST -d '{}' ${{ secrets.NETLIFY_BUILD_HOOK_URL }}

      - name: Ping Google Search Console sitemap
        run: |
          sleep 30
          curl -s "https://www.google.com/ping?sitemap=https://cedar.tw/sitemap.xml"
